[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[crons]
  [crons.send-notifications]
  schedule = "0 * * * *"
  command = "curl -s http://localhost:${PORT:-8000}/send-line-notifications"
